services:

  user-service:
    build: ./user-service
    ports:
      - "8001:8001"

  order-service:
    build: ./order-service
    ports:
      - "8002:8002"

  payment-service:
    build: ./payment-service
    ports:
      - "8003:8003"

  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    depends_on:
      - user-service
      - order-service
      - payment-service

  frontend:
    build: ./frontend
    ports:
      - "5000:5000"
    depends_on:
      - api-gateway
